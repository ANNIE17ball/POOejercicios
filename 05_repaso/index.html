<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso
    </title>
    <!-- fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Macondo&family=Pirata+One&display=swap" rel="stylesheet">

    <!-- css botstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="static/css/styles.css">
</head>

<body>
    <header class="p-3 bg-color5 mb-3">
        <div class="container-fluid d-flex justify-content-center"">
            <span class=" mb-0 fs-1 pirata-font text-color1 ">‧₊ ᵎᵎ Desarrollar ejercicios para practicar. ⋅ ˚✮</span>
        </div>
    </header>

    <div class=" container d-flex justify-content-center">
            <!-- row fila de columnas -->
            <div class="row">
                <div class="col d-flex flex-column gap-3">
                    <!-- ejercicio uno -->
                    <div class="card border-color2 bg-color3" style="width: 18rem;">
                        <div class="card-body">
                            <h5 class="card-title text-color2 pirata-font">Función con validación de datos ᵎᵎ</h5>
                            <a href="#" class="btn bg-color2 hover-bg-color4 text-color1 ink-font"
                                onclick="verificarNumero()">Iniciar</a>
                            <!-- input -->
                            <div class="input-group my-3">
                                <span class="input-group-text bg-color2 text-color1"
                                    id="inputGroup-sizing-default">➜</span>
                                <input type="text" class="form-control ink-font" aria-label="Sizing example input"
                                    aria-describedby="inputGroup-sizing-default" id="val1"
                                    placeholder="Ingresar número">
                            </div>

                            <!-- mostrar resultado -->
                            <div id="resultado1" class="d-none bg-color2 p-3 rounded">
                                <h6 class="text-color3 pirata-font">resultado:</h6>
                                <div id="pantalla1" class="text-color3 ink-font"></div>
                            </div>
                        </div>
                    </div>

                    <!-- ejercicio dos -->
                    <div class="card border-color2 bg-color3" style="width: 18rem;">
                        <div class="card-body">
                            <h5 class="card-title text-color2 pirata-font">Función con validación de datos</h5>
                            <a href="#" class="btn bg-color2 hover-bg-color4 text-color1 ink-font"
                                onclick="evaluarNota()">Iniciar</a>
                            <!-- input -->
                            <div class="input-group my-3">
                                <span class="input-group-text bg-color2 text-color1"
                                    id="inputGroup-sizing-default">➜</span>
                                <input type="text" class="form-control ink-font" aria-label="Sizing example input"
                                    aria-describedby="inputGroup-sizing-default" id="nombre"
                                    placeholder="Ingresar nombre estudiante">
                            </div>

                            <div class="input-group my-3">
                                <span class="input-group-text bg-color2 text-color1"
                                    id="inputGroup-sizing-default">➜</span>
                                <input type="text" class="form-control ink-font" aria-label="Sizing example input"
                                    aria-describedby="inputGroup-sizing-default" id="val2" placeholder="Ingresar nota">
                            </div>

                            <!-- mostrar resultado -->
                            <div id="resultado2" class="d-none bg-color2 p-3 rounded">
                                <h6 class="text-color3 pirata-font">resultado:</h6>
                                <div id="pantalla2" class="text-color3 ink-font"></div>
                            </div>
                        </div>
                    </div>


                </div>
                <div class="col d-flex flex-column gap-3">
                    <!-- ejercicio tres -->
                    <div class="card border-color2 bg-color3" style="width: 18rem;">
                        <div class="card-body">
                            <h5 class="card-title text-color2 pirata-font">Uso de múltiples funciones</h5>
                            <a href="#" class="btn bg-color2 hover-bg-color4 text-color1 ink-font"
                                onclick="procesarNumero()">Iniciar</a>
                            <!-- input -->
                            <div class="input-group my-3">
                                <span class="input-group-text bg-color2 text-color1"
                                    id="inputGroup-sizing-default">➜</span>
                                <input type="text" class="form-control ink-font" aria-label="Sizing example input"
                                    aria-describedby="inputGroup-sizing-default" id="val3"
                                    placeholder="Ingresa un valor">
                            </div>

                            <!-- mostrar resultado -->
                            <div id="resultado3" class="d-none bg-color2 p-3 rounded">
                                <h6 class="text-color3 pirata-font">resultado:</h6>
                                <div id="pantalla3" class="text-color3 ink-font"></div>
                            </div>
                        </div>
                    </div>

                    <!-- ejercicio cuatro -->
                    <div class="card border-color2 bg-color3" style="width: 18rem;">
                        <div class="card-body">
                            <h5 class="card-title text-color2 pirata-font">Función que transforma texto</h5>
                            <a href="#" class="btn bg-color2 hover-bg-color4 text-color1 ink-font"
                                onclick="transformarTexto()">Iniciar</a>
                            <!-- input -->
                            <div class="input-group my-3">
                                <span class="input-group-text bg-color2 text-color1"
                                    id="inputGroup-sizing-default">➜</span>
                                <input type="text" class="form-control ink-font" aria-label="Sizing example input"
                                    aria-describedby="inputGroup-sizing-default" id="val4" placeholder="Entrada">
                            </div>

                            <!-- mostrar resultado -->
                            <div id="resultado4" class="d-none bg-color2 p-3 rounded">
                                <h6 class="text-color3 pirata-font">resultado:</h6>
                                <div id="pantalla4" class="text-color3 ink-font"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="static/js/scrip.js"></script>
        <!-- bootstrap js -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
